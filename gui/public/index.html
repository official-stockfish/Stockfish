<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stockfish Premium Chess</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Chess.js for move validation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
</head>
<body>
    <div class="game-container">
        <div class="eval-container">
            <div id="eval-bar" class="eval-bar">
                <div id="eval-white" class="eval-white" style="height: 50%;"></div>
                <div id="eval-score" class="eval-score">0.0</div>
            </div>
        </div>

        <div class="board-container">
            <div class="captured-pieces" id="captured-black"></div>
            <div id="board" class="board">
                <!-- Squares will be generated by JS -->
            </div>
            <div class="captured-pieces" id="captured-white"></div>
        </div>
        
        <div class="sidebar">
            <h2>Stockfish Engine</h2>
            
            <div class="status-panel">
                <p id="status">White to move</p>
                <p id="engine-status" style="font-size: 0.8rem; color: var(--text-secondary);">Engine: Idle</p>
            </div>

            <div class="move-history">
                <div id="move-list" class="move-list">
                    <!-- Moves will appear here -->
                </div>
            </div>

            <div class="controls">
                <button id="new-game">New Game</button>
                <button id="undo-move" class="secondary">Undo</button>
                <button id="flip-board" class="secondary">Flip Board</button>
            </div>
            
            <div class="settings" style="margin-top: 20px;">
                <label style="font-size: 0.8rem; color: var(--text-secondary);">Engine Depth</label>
                <input type="range" id="depth-range" min="1" max="20" value="10" style="width: 100%; accent-color: var(--accent);">
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
